<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 بحث متقدم - MUSTAFA MIXING</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --bg2: #0f0f18; --bg3: #181825;
            --border: #2a2a3e; --text: #e8e8f0; --text2: #9898b8; --text3: #6a6a88;
            --gold: #d4a843; --gold2: #f5c842;
        }
        body { font-family: 'Cairo', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .search-header { text-align: center; margin-bottom: 40px; }
        .search-header h1 { font-size: 2.2rem; color: var(--gold); margin-bottom: 10px; }
        .search-header p { font-size: 1rem; color: var(--text2); }
        .search-box {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid var(--gold); border-radius: 15px; padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); margin-bottom: 30px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-1 { grid-column: 1 / -1; }
        .field label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gold); margin-bottom: 8px; letter-spacing: 1px; }
        .field input, .field select {
            width: 100%; padding: 12px 14px; background: #0f3460;
            border: 2px solid var(--gold); border-radius: 8px; color: var(--text);
            font-size: 0.9rem; font-family: inherit; transition: all 0.3s ease;
        }
        .field input:focus, .field select:focus {
            outline: none; background: #163a57; border-color: #ffd700;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .field input::placeholder { color: #7a7a7a; }
        .field select[multiple] { min-height: 100px; }
        .field select option { background: #1a1a2e; color: var(--text); padding: 8px; }
        .field select option:checked { background: var(--gold); color: #1a1a2e; }
        .btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
        .btn {
            padding: 12px 35px; border: none; border-radius: 8px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px; font-family: inherit;
        }
        .btn-search { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #1a1a2e; box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,175,55,0.5); }
        .btn-reset { background: #0f3460; color: var(--gold); border: 2px solid var(--gold); }
        .btn-reset:hover { background: #1a4a66; }
        .results-header { color: var(--gold); font-size: 1.3rem; border-bottom: 2px solid var(--gold); padding-bottom: 12px; margin-bottom: 20px; }
        .track-card {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border: 1px solid var(--gold); border-radius: 10px; padding: 20px;
            margin-bottom: 12px; transition: all 0.2s ease;
        }
        .track-card:hover { border-color: var(--gold2); transform: translateX(-3px); }
        .track-title { color: var(--gold); font-size: 1.1rem; font-weight: 600; }
        .track-meta { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 8px; font-size: 0.85rem; color: var(--text2); }
        .track-meta span { background: rgba(212,175,55,0.1); padding: 3px 10px; border-radius: 6px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .badge-verified { background: rgba(34,197,94,0.2); color: #22c55e; }
        .badge-likely { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .badge-possible { background: rgba(234,179,8,0.2); color: #eab308; }
        .badge-unknown { background: rgba(148,163,184,0.2); color: #94a3b8; }
        .no-results { text-align: center; padding: 50px; border: 2px dashed var(--gold); border-radius: 10px; color: var(--text2); }
        .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .pagination button {
            padding: 8px 16px; background: #0f3460; color: var(--text);
            border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
            transition: all 0.2s; font-family: inherit;
        }
        .pagination button:hover { background: var(--gold); color: #1a1a2e; }
        .pagination button.active { background: var(--gold); color: #1a1a2e; font-weight: bold; }
        .loading { text-align: center; padding: 40px; color: var(--gold); font-size: 1.2rem; }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .search-box { padding: 20px; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-header">
        <h1>🔍 بحث متقدم | Advanced Search</h1>
        <p>ابحث عن الفنان والوصف المهني والمنصة | Search for artist, profession & platform</p>
    </div>

    <div class="search-box">
        <form id="searchForm">
            <div class="grid-2">
                <div class="field">
                    <label>اسم الفنان (عربي)</label>
                    <input type="text" id="artistNameAr" name="artistNameAr" placeholder="مثال: مصطفى كمال">
                </div>
                <div class="field">
                    <label>Artist Name (English)</label>
                    <input type="text" id="artistNameEn" name="artistNameEn" placeholder="Example: Mustafa Kamal">
                </div>
                <div class="field">
                    <label>الوصف المهني (عربي)</label>
                    <input type="text" id="professionAr" name="professionAr" placeholder="مثال: مهندس صوت">
                </div>
                <div class="field">
                    <label>Profession (English)</label>
                    <input type="text" id="professionEn" name="professionEn" placeholder="Example: Sound Engineer">
                </div>
                <div class="field grid-1">
                    <label>اختر المنصات | Select Platforms</label>
                    <select id="platforms" name="platforms" multiple>
                        <option value="youtube">🎥 YouTube</option>
                        <option value="spotify">🎵 Spotify</option>
                        <option value="apple-music">🎧 Apple Music</option>
                        <option value="soundcloud">☁️ SoundCloud</option>
                        <option value="bandcamp">🎼 Bandcamp</option>
                        <option value="tiktok">📱 TikTok</option>
                        <option value="instagram">📸 Instagram</option>
                    </select>
                </div>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-search">🔍 ابحث | Search</button>
                <button type="reset" class="btn btn-reset">🔄 مسح | Clear</button>
            </div>
        </form>
    </div>

    <div id="searchResults"></div>
</div>

<script>
const api = {
    search: async function(params) {
        const q = new URLSearchParams();
        for (const [k, v] of Object.entries(params)) {
            if (Array.isArray(v)) v.forEach(x => q.append(k, x));
            else if (v) q.append(k, v);
        }
        const r = await fetch('/api/advanced-search?' + q.toString());
        return r.json();
    }
};

document.getElementById('searchForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const rc = document.getElementById('searchResults');
    rc.innerHTML = '<div class="loading">⏳ جاري البحث...</div>';

    try {
        const params = {
            artistNameAr: document.getElementById('artistNameAr').value.trim(),
            artistNameEn: document.getElementById('artistNameEn').value.trim(),
            professionAr: document.getElementById('professionAr').value.trim(),
            professionEn: document.getElementById('professionEn').value.trim(),
            page: 1,
            perPage: 20
        };

        const sel = document.getElementById('platforms');
        params.platforms = [];
        for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].selected && sel.options[i].value) params.platforms.push(sel.options[i].value);
        }

        if (!params.artistNameAr && !params.artistNameEn && !params.professionAr && !params.professionEn && params.platforms.length === 0) {
            alert('⚠️ الرجاء ملء حقل واحد على الأقل');
            rc.innerHTML = '';
            return;
        }

        const result = await api.search(params);
        if (!result.success) {
            rc.innerHTML = '<div class="no-results"><p>❌ خطأ: ' + (result.error || 'غير معروف') + '</p></div>';
            return;
        }

        const data = result.data;
        if (!data || data.length === 0) {
            rc.innerHTML = '<div class="no-results"><p>😔 لا توجد نتائج</p><small>جرب بحثاً آخر</small></div>';
            return;
        }

        let html = '<div class="results-header">📊 ' + data.length + ' نتيجة</div>';
        for (let i = 0; i < data.length; i++) {
            const t = data[i];
            const roles = [];
            if (t.role_mixing) roles.push('🎛️ Mix');
            if (t.role_mastering) roles.push('🎚️ Master');
            if (t.role_recording) roles.push('🎙️ Record');
            if (t.role_arranging) roles.push('🎼 Arrange');
            if (t.role_composing) roles.push('✍️ Compose');
            if (t.role_producing) roles.push('🎬 Produce');
            if (t.role_sound_engineer) roles.push('🔊 Sound');
            const confClass = (t.confidence_level || 'unknown').toLowerCase();
            html += '<div class="track-card"><div class="track-title">' + (t.title || '—') + '</div>' +
                '<div class="track-meta">' +
                '<span>🎤 ' + (t.artist || t.artist_ar || '—') + '</span>' +
                '<span>📅 ' + (t.release_year || '—') + '</span>' +
                (t.platform ? '<span>📡 ' + t.platform + '</span>' : '') +
                (roles.length ? '<span>' + roles.join(' · ') + '</span>' : '') +
                (t.youtube_url || t.source_url ? '<span><a href="' + (t.youtube_url || t.source_url) + '" target="_blank" style="color:var(--gold);text-decoration:none">🎥 مشاهدة | Watch</a></span>' : '') +
                '<span class="badge badge-' + confClass + '">' + (t.confidence_level || 'Unknown') + '</span>' +
                '</div></div>';
        }
        rc.innerHTML = html;
    } catch (e) {
        document.getElementById('searchResults').innerHTML = '<div class="no-results"><p>❌ خطأ في الاتصال: ' + e.message + '</p></div>';
    }
});

document.querySelector('.btn-reset').addEventListener('click', function() {
    document.getElementById('searchResults').innerHTML = '';
});
</script>
</body>
</html>
